# This file controls the settings for your Quarto template from www.marvinschmitt.com

# website settings
website:
  title: "Kevin Mansfield"                                # Your name
  site-url: https://kpmansfield.github.io/
  description: "Associate Professor UCL Institute for Environmental Design and Engineering"   # A brief slogan (optional)
  image: img/my_image.jpg
  
  favicon: img/favicon.png
  
  # start of the navigation bar at the top of the website
  navbar:
    pinned: true
    logo: /img/logo.png
    
    # your sub-pages
    left:
      - text: "About"  
        href: about/index.qmd
      - text: "Projects"
        href: projects/index.qmd
      - text: "Photography"
        href: photography/index.qmd
      - text: "CV"
        href: cv/index.qmd
      - text: "Blog"
        href: posts.qmd
    
    # your social media handles
    right:
      - icon: twitter-x
        href: https://twitter.com/mansfieldkp
      - icon: mastodon
        href: https://masto.ai/@kpmansfield/
      - icon: github
        href: https://github.com/kpmansfield
      - icon: linkedin
        href: https://www.linkedin.com/in/kevin-mansfield-5b4693a3/
      - icon: envelope
        aria-label: email
        href: "mailto:kevin.mansfield@ucl.ac.uk"  
  
  

# Don't touch unless you know what you are doing :) ------------
  search: 
    location: navbar
    type: textbox
  page-footer: 
    left: |
      <span class="faux-block">Template &#169; 2023 Marvin Schmitt CC BY-SA 4.0</span>

project:
  type: website
  output-dir: docs

  preview: 
    port: 22222
    browser: true
    watch-inputs: true
    navigate: true

execute:
  freeze: true

format:
  html:
    fontsize: 1.0em #1.1em
    theme: 
     light:
      - cosmo # pulse
      - html/styles.scss
    toc: false
    code-link: true
    anchor-sections: true
    fig-cap-location: margin
    reference-location: margin
    footnotes-hover: true